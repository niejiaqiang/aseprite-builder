name: Build and release Aseprite

on:
  push:
    branches:
      - main
    paths:
      - 'BuildLog.md'
  workflow_dispatch:
env:
  BUILD_TYPE: Release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-aseprite-info:
    name: Fetch deps info
    runs-on: ubuntu-latest
    outputs:
      download-link: ${{ steps.aseprite-link.outputs.download-link }}
      release-tag: ${{ steps.aseprite-link.outputs.release-tag }}
    steps:
      - name: Fetch Aseprite release link
        id: aseprite-link
        uses: a1393323447/fetch-release@main
        with:
            group: aseprite
            repo: aseprite
            match: Aseprite-.*?-Source.zip

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: fetch-aseprite-info
    permissions:
      contents: write
    outputs:
      download-link: ${{ needs.fetch-aseprite-info.outputs.download-link }}
      release-tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
      mac-asset-exists: ${{ steps.check-assets.outputs.mac-asset-exists }}
      windows-asset-exists: ${{ steps.check-assets.outputs.windows-asset-exists }}
    steps:
      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
          body: Aseprite-${{ needs.fetch-aseprite-info.outputs.release-tag }}
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check existing release assets
        id: check-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ needs.fetch-aseprite-info.outputs.release-tag }}"
          assets=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' || true)

          mac_asset="Aseprite-${tag}-macOS.zip"
          windows_asset="Aseprite-${tag}-Windows.zip"

          if echo "$assets" | grep -Fxq "$mac_asset"; then
            echo "mac-asset-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "mac-asset-exists=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$assets" | grep -Fxq "$windows_asset"; then
            echo "windows-asset-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "windows-asset-exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-aseprite:
    name: Build Aseprite
    needs: create-release
    permissions:
      contents: write
    if: |
      (matrix.os != 'macOS-latest' || needs.create-release.outputs.mac-asset-exists != 'true') &&
      (matrix.os != 'windows-latest' || needs.create-release.outputs.windows-asset-exists != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: [ windows-latest, macOS-latest ]
        fail-fast: false
    steps:
      - name: Install Aseprite
        shell: bash
        run: |
          git clone \
            --depth 1 \
            --single-branch \
            --branch ${{ needs.create-release.outputs.release-tag }} \
            --recurse-submodules \
            --shallow-submodules \
            -j8 \
            https://github.com/aseprite/aseprite
      - name: Cache Skia
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: aseprite/skia
          key: skia-m124-08a5439a6b-${{ runner.os }}-${{ runner.arch }}
      - name: Install Skia
        if: steps.cache-skia.outputs.cache-hit != 'true'
        working-directory: aseprite
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]] ; then
            choco install wget -y --no-progress
            wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
            unzip Skia-Windows-Release-x64.zip -d skia
          elif [[ "${{ runner.os }}" == "macOS" ]] ; then
            if [[ "${{ runner.arch }}" == "ARM64" ]] ; then
              wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-macOS-Release-arm64.zip
              unzip Skia-macOS-Release-arm64.zip -d skia
            else
              wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-macOS-Release-x64.zip
              unzip Skia-macOS-Release-x64.zip -d skia
            fi
          else
            wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Linux-Release-x64.zip
            unzip Skia-Linux-Release-x64.zip -d skia
          fi
      - uses: aseprite/get-ninja@main
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - name: Generating Makefiles
        shell: bash
        working-directory: aseprite
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=on

          if [[ "${{ runner.os }}" == "macOS" ]] ; then
            if [[ "${{ runner.arch }}" == "ARM64" ]] ; then
              export skia_arch=arm64
              export macos_deployment_target=11.0
            else
              export skia_arch=x64
              export macos_deployment_target=10.9
            fi
          else
            export skia_arch=x64
            export macos_deployment_target=10.9
          fi

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=$macos_deployment_target \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)
      - name: Compiling
        shell: bash
        working-directory: aseprite
        run: |
          cd build && ninja
      - name: Clean Up Build folder (Windows)
        if: runner.os == 'Windows'
        working-directory: aseprite/build/bin
        shell: bash
        run: find . -mindepth 1 ! \( -name 'aseprite' -o -name 'aseprite.exe' -o -name 'data' -prune \) -exec rm -rf {} +
      - name: Clean Up Build folder (macOS)
        if: runner.os == 'macOS'
        working-directory: aseprite/build/bin
        shell: bash
        run: echo "Skip cleanup on macOS to avoid removing app bundle contents."
      - name: Make portable zip
        working-directory: aseprite/build/bin
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini
      - name: Create release
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            if [[ -d aseprite.app ]]; then
              7z -tzip a Aseprite-${{ needs.create-release.outputs.release-tag }}-${{ runner.os }}.zip aseprite.app aseprite.ini
            elif [[ -f aseprite ]]; then
              7z -tzip a Aseprite-${{ needs.create-release.outputs.release-tag }}-${{ runner.os }}.zip aseprite aseprite.ini data
            else
              echo "No macOS Aseprite bundle/binary found in aseprite/build/bin"
              ls -la
              exit 1
            fi
          else
            7z -tzip a Aseprite-${{ needs.create-release.outputs.release-tag }}-${{ runner.os }}.zip *
          fi
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/Aseprite-${{ needs.create-release.outputs.release-tag }}-${{ runner.os }}.zip
          asset_name: Aseprite-${{ needs.create-release.outputs.release-tag }}-${{ runner.os }}.zip
          tag: ${{ needs.create-release.outputs.release-tag }}
          overwrite: true
